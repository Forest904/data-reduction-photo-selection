experiment_name: scalability
dataset_kind: raw
photos_path: data/raw/photos.csv
queries_path: data/raw/queries.csv
id_base: one
methods: [B, D]
sample_sizes: [1000, 5000, 10000, 20000, 41620]
budgets: [3]
seeds: [0]
sample_strategy: query_active
include_full_dataset: true
metrics:
  - cosine_proxy_utility
  - jaccard_precision_utility
  - runtime_seconds
  - peak_memory_mb
limits:
  candidate_chunk_size: 2048
  max_facility_similarity_mb: 64
