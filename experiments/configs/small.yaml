experiment_name: small_exact_comparison
dataset_kind: raw
photos_path: data/raw/photos.csv
queries_path: data/raw/queries.csv
id_base: auto
methods: [A, B, C, D]
sample_sizes: [6, 8, 10, 12]
budgets: [3]
seeds: [0, 1, 2]
sample_strategy: query_active
metrics:
  - cosine_proxy_utility
  - jaccard_precision_utility
  - runtime_seconds
  - peak_memory_mb
limits:
  max_exhaustive_photos: 25
  max_exhaustive_combinations: 100000
  max_shapley_photos: 12
  max_shapley_coalitions: 4096
  candidate_chunk_size: 2048
  max_facility_similarity_mb: 64
